spring.application.name=jaatm-bea

# Application logs
logging.level.za.co.ashtech.jaatm.bea=INFO

#root context
server.servlet.context-path=/jaatm-bea
server.port=11100

#Actuator end points to expose
management.endpoints.web.exposure.include=health,info,env

spring.datasource.url=jdbc:mysql://mysql-3892ec6f-ashwin-3dd0.d.aivencloud.com:21606/defaultdb?sslMode=REQUIRED
spring.datasource.username=${MYSQL_USR]
spring.datasource.password=${MYSQL_USR}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional but recommended (JPA/Hibernate)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true